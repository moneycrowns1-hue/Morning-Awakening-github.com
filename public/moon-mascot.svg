<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Moon mascot">
  <defs>
    <!-- Outer halo (soft, far) -->
    <radialGradient id="halo-far" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4c2ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d9a3ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6b2c8f" stop-opacity="0"/>
    </radialGradient>
    <!-- Petal glow (warm rose at the bottom) -->
    <radialGradient id="halo-petal" cx="50%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#ffd4e5" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#ffd4e5" stop-opacity="0"/>
    </radialGradient>
    <!-- Moon body: violet core → dusk rose rim -->
    <radialGradient id="moon-body" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f4c2ff"/>
      <stop offset="35%" stop-color="#d9a3ff"/>
      <stop offset="75%" stop-color="#8a3fb0"/>
      <stop offset="100%" stop-color="#4a1d6e"/>
    </radialGradient>
    <!-- Top highlight -->
    <radialGradient id="moon-highlight" cx="38%" cy="28%" r="32%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Cheek blush -->
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8fb8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ff8fb8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Layered halos -->
  <circle cx="256" cy="256" r="248" fill="url(#halo-far)"/>
  <circle cx="256" cy="340" r="200" fill="url(#halo-petal)"/>

  <!-- Moon body -->
  <g id="moon-body-group">
    <circle cx="256" cy="256" r="170" fill="url(#moon-body)"/>
    <circle cx="256" cy="256" r="170" fill="url(#moon-highlight)"/>
    <!-- Cheeks -->
    <ellipse cx="178" cy="300" rx="34" ry="22" fill="url(#cheek)"/>
    <ellipse cx="334" cy="300" rx="34" ry="22" fill="url(#cheek)"/>
    <!-- Eyes (closed, smiling arcs) -->
    <g id="moon-eyes" stroke="#2a0f45" stroke-width="8" stroke-linecap="round" fill="none">
      <path d="M 190 252 Q 210 232 230 252"/>
      <path d="M 282 252 Q 302 232 322 252"/>
    </g>
    <!-- Gentle smile -->
    <path d="M 224 318 Q 256 340 288 318" stroke="#2a0f45" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Soft inner rim shadow -->
    <circle cx="256" cy="256" r="168" fill="none" stroke="#2a0f45" stroke-opacity="0.12" stroke-width="4"/>
  </g>
</svg>
